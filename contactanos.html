<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styles-contactanos.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <nav class="nav">
            <img class="nav__logo" src="Imagenes/Logo.png" alt="Imagen logo del blog">

            <ul class="nav__items">
                <li><a class="nav__link" href="/index.html">Inicio</a></li>
                <li><a class="nav__link" href="/acerca.html">Acerca</a></li>
                <li><a class="nav__link" href="/contactanos.html">Contacto</a></li>
            </ul>

            <div class="nav__toggle">☰</div>            
        </nav>

<div class="container">

    
    <h1>Contáctanos</h1>

    <div class="contact-wrapper">

        <!-- Información -->
        <div class="contact-info">
            <h2>Información</h2>

            <div class="info-item">
                <h4><i class="fa-solid fa-envelope"></i> Correo</h4>
                <p>solary@tusitio.com</p>
            </div>

            <div class="info-item">
                <h4><i class="fa-solid fa-phone"></i> Teléfono</h4>
                <p>+57 300 123 4567</p>
            </div>

            <div class="info-item">
                <h4><i class="fa-solid fa-location-dot"></i> Dirección</h4>
                <p>Bogotá, Colombia</p>
            </div>
        </div>

        <!-- Formulario -->
        <div class="contact-form">
            <h2>Envíanos un mensaje</h2>

            <form>
                <input type="text" placeholder="Nombre" required>
                <input type="email" placeholder="Correo electrónico" required>
                <input type="text" placeholder="Asunto">
                <textarea placeholder="Escribe tu mensaje..." required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
