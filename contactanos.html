<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles-contactanos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-md navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="/index.html"><img src="Imagenes/Logo.png" width="220" height="50"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="menuNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="/index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="/acerca.html">Acerca</a></li>
                        <li class="nav-item"><a class="nav-link" href="/contactanos.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="contact-container">
        <h1>Contáctanos</h1>
        <div class="contact-wrapper">

            <div class="contact-info">
                <h2>Información</h2>
                <div class="info-item">
                    <h4><i class="fa-solid fa-envelope"></i> Correo</h4>
                    <p>solary@tusitio.com</p>
                </div>
                <div class="info-item">
                    <h4><i class="fa-solid fa-phone"></i> Teléfono</h4>
                    <p>+57 300 123 4567</p>
                </div>
                <div class="info-item">
                    <h4><i class="fa-solid fa-location-dot"></i> Dirección</h4>
                    <p>Bogotá, Colombia</p>
                </div>
            </div>

            <div class="contact-form">
                <h2>Envíanos un mensaje</h2>
                <form>
                    <input type="text" placeholder="Nombre" required>
                    <input type="email" placeholder="Correo electrónico" required>
                    <input type="text" placeholder="Asunto">
                    <textarea placeholder="Escribe tu mensaje..." required></textarea>
                    <button type="submit">Enviar</button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
